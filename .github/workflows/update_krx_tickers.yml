name: Update KRX Tickers

on:
  schedule:
    # 매일 오전 9시 20분 KST (= UTC 00:20), 평일만
    - cron: '20 0 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  update-tickers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate krx_tickers.json
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python generate_krx_tickers.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add krx_tickers.json
          git diff --cached --quiet && echo "변경 없음" || (
            git commit -m "chore: update krx_tickers.json ($(date '+%Y-%m-%d'))"
            git push
          )
