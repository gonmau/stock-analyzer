name: Price Alert (Discord)

on:
  schedule:
    # KST 08:00~20:00 사이 10분 간격 (UTC 23:00~11:00, 평일)
    - cron: '*/10 23 * * 0-4'
    - cron: '*/10 0-10 * * 1-5'
    - cron: '0 11 * * 1-5'
  push:
    paths:
      - 'price_alerts.json'
      - 'positions_snapshot.json'
  workflow_dispatch:

jobs:
  price-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price alert check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python discord_alert.py

      - name: Commit and push alert_state.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f alert_state.json ]; then
            git add alert_state.json
            git diff --cached --quiet && echo "변경 없음" || (
              git commit -m "chore: update alert_state.json ($(date '+%Y-%m-%d %H:%M KST'))"
              git push
            )
          else
            echo "alert_state.json 없음 - 커밋 생략"
          fi
