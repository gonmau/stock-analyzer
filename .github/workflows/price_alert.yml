name: Price Alert (Discord)

on:
  schedule:
    # KST 08:00~20:00 사이 5분 간격 (UTC 23:00~11:00, 평일)
    # UTC 23:00~23:55 (KST 전날 → 당일 08:00~08:55) : 일~목 (KST 월~금)
    - cron: '*/5 23 * * 0-4'
    # UTC 00:00~10:55 (KST 09:00~19:55) : 월~금 (KST 화~토이지만 금요일까지만)
    - cron: '*/5 0-10 * * 1-5'
    # UTC 11:00 (KST 20:00) 마지막 실행
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  price-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price alert check
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python discord_alert.py

      - name: Commit and push alert_state.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f alert_state.json ]; then
            git add alert_state.json
            git diff --cached --quiet && echo "변경 없음" || (
              git commit -m "chore: update alert_state.json ($(date '+%Y-%m-%d %H:%M KST'))"
              git push
            )
          else
            echo "alert_state.json 없음 - 커밋 생략"
          fi
